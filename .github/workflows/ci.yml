name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - project-main

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit ruff

      - name: Run pre-commit
        run: python -m pre_commit run --all-files

      - name: Python smoke checks
        run: |
          python -m py_compile setup/validate_odoo_module.py
