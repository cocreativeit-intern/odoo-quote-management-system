name: CD

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build source archive
        run: |
          tar --exclude-vcs -czf odoo-project-${{ github.ref_name }}.tar.gz .

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: odoo-project-${{ github.ref_name }}.tar.gz
